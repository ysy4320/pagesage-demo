<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 文章总结</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <svg class="header-icon" viewBox="0 0 24 24">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
      </svg>
      <h1>AI 文章总结</h1>
      <button class="settings-btn" id="settingsBtn" title="设置">
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.488.488 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.488.488 0 00-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
        </svg>
      </button>
    </div>
    <button class="btn btn-primary" id="startBtn">
      <svg class="btn-icon" viewBox="0 0 24 24">
        <path d="M19 8l-4 4h3c0 3.31-2.69 6-6 6-1.01 0-1.97-.25-2.8-.7l-1.46 1.46C8.97 19.54 10.43 20 12 20c4.42 0 8-3.58 8-8h3l-4-4zM6 12c0-3.31 2.69-6 6-6 1.01 0 1.97.25 2.8.7l1.46-1.46C15.03 4.46 13.57 4 12 4c-4.42 0-8 3.58-8 8H1l4 4 4-4H6z"/>
      </svg>
      开始总结
    </button>
    <div class="status-bar idle hidden" id="statusBar">
      <div class="spinner hidden" id="spinner"></div>
      <span class="status-text" id="statusText">准备就绪</span>
    </div>
    <div class="result-area" id="resultArea">
      <div class="card" id="thesisCard">
        <div class="card-header">
          <svg class="card-icon" viewBox="0 0 24 24" fill="#1976D2">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
          </svg>
          <span class="card-title">核心论点</span>
        </div>
        <div class="card-body">
          <div class="thesis-text" id="thesisText"></div>
        </div>
      </div>
      <div class="card" id="argumentsCard">
        <div class="card-header">
          <svg class="card-icon" viewBox="0 0 24 24" fill="#1976D2">
            <path d="M11 7h2v2h-2zm0 4h2v6h-2zm1-9C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
          </svg>
          <span class="card-title">关键论点</span>
        </div>
        <div class="card-body" id="argumentsContainer"></div>
      </div>
      <div class="card" id="evidenceCard">
        <div class="card-header">
          <svg class="card-icon" viewBox="0 0 24 24" fill="#1976D2">
            <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
          </svg>
          <span class="card-title">论据与数据</span>
        </div>
        <div class="card-body">
          <div class="evidence-text" id="evidenceText"></div>
        </div>
      </div>
      <div class="card" id="conclusionCard">
        <div class="card-header">
          <svg class="card-icon" viewBox="0 0 24 24" fill="#1976D2">
            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
          </svg>
          <span class="card-title">结论与展望</span>
        </div>
        <div class="card-body">
          <div class="conclusion-text" id="conclusionText"></div>
        </div>
      </div>
      <div class="card" id="termsCard">
        <div class="card-header">
          <svg class="card-icon" viewBox="0 0 24 24" fill="#1976D2">
            <path d="M12.87 15.07l-2.54-2.51.03-.03c1.74-1.94 2.98-4.17 3.71-6.53H17V4h-7V2H8v2H1v1.99h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/>
          </svg>
          <span class="card-title">专业术语</span>
        </div>
        <div class="card-body">
          <div class="terms-container" id="termsContainer"></div>
        </div>
      </div>
      <div class="card" id="readingCard">
        <div class="card-header">
          <svg class="card-icon" viewBox="0 0 24 24" fill="#1976D2">
            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
          </svg>
          <span class="card-title">阅读建议</span>
        </div>
        <div class="card-body" id="readingContainer"></div>
      </div>
      <div class="tokens-info" id="tokensInfo"></div>
    </div>
    <div class="empty-state" id="emptyState">
      <svg viewBox="0 0 24 24">
        <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"/>
        <path d="M11 12h2v2h-2zm0-6h2v4h-2z"/>
      </svg>
      <div class="empty-state-text">
        点击"开始总结"按钮，<br/>AI 将自动提取当前页面内容并生成结构化总结。
      </div>
    </div>
  </div>
  <div class="modal-overlay hidden" id="settingsModal">
    <div class="modal">
      <div class="modal-header">
        <h2>API 设置</h2>
        <button class="modal-close" id="modalCloseBtn">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="apiKeyInput">API 密钥 <span class="required">*</span></label>
          <input type="password" id="apiKeyInput" placeholder="sk-..." autocomplete="off" />
        </div>
        <div class="form-group">
          <label for="endpointInput">API 地址</label>
          <input type="url" id="endpointInput" placeholder="https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions" />
        </div>
        <div class="form-group">
          <label for="modelInput">模型</label>
          <input type="text" id="modelInput" placeholder="qwen-long" />
        </div>
        <div class="form-error hidden" id="formError"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary btn-modal" id="saveConfigBtn">保存</button>
      </div>
    </div>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
